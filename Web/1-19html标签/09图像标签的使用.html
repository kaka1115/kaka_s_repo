<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>图像标签的基本使用：</h2>
    <img src="lvluo.jpg" alt="这是一张图片" title="这是一张图片" width="100" height="100">
    <!-- 图片得和文件放在一块儿 -->
     <h2>图像标签修改宽度和高度：</h2>
    <img src="lvluo.jpg" alt="这是一张图片" width="300" height="300">
    <!-- 一般情况下宽和高我们修改一个就可以了，剩下的会等比例缩放 -->
</body>
</html>
