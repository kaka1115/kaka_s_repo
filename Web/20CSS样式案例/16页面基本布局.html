<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面基本布局</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .header {
            height: 80px;
            background-color: black;
        }
        .nav {
            width: 1000px;
            height: 60px;
            background-color: skyblue;
        }
        .main {
            width: 1000px;
            height: 1000px;
            background-color: pink;
        }

        .footer {
            height: 80px;
            background-color: rgb(225, 86, 181);
        }
        .center {
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- 头部内容 -->
    <div class="header"></div>
    <!-- 导航栏 -->
    <div class="nav center"></div>
    <!-- 主体内容 -->
    <div class="main center"></div>
    <!-- 页脚内容 -->
    <div class="footer"></div>
</body>
</html>
