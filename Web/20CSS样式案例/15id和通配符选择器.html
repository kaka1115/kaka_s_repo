<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id和通配符选择器</title>
    <style>
        #pink {
            color: pink;
        }
        #green {
            color: green;
        }
    </style>
</head>
<body>
    <div>大春</div>
    <div id="pink">夏洛</div>
    <div id="green">秋雅</div>
    <div>冬梅</div>
</body>
</html>
