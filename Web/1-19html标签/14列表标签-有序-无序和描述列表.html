<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>1.无序列表</h2>
    <ul>
        <li>猪爸爸</li>
        <li>猪妈妈</li>
        <li>小猪</li>
    </ul>
    <!-- 用得比较少 -->
    <h2>2.有序列表</h2> 
    <ol>
        <li>猪爸爸</li>
        <li>猪妈妈</li>
        <li>小猪</li>
    </ol>

    <h2>3.描述列表（自定义）</h2>
    <dl>
        <dt>猪爸爸</dt>
        <dd>我是猪爸爸1</dd>
        <dd>我是猪爸爸2</dd>
        <dd>我是猪爸爸3</dd>

        <dt>猪妈妈</dt>
        <dd>我是猪妈妈1</dd>
        <dd>我是猪妈妈2</dd>
        <dd>我是猪妈妈3</dd>

        <dt>小猪</dt>
        <dd>我是小猪1</dd>
        <dd>我是小猪2</dd>
        <dd>我是小猪3</dd>
        <dd>我是小猪4</dd>
    </dl>
</body>
</html>
